# 站点配置
title: AI Daily Digest
description: AI每日精选 - Reddit、Twitter、音乐制作技术情报
author: babyking

# URL配置（如果你有自己的域名，可以修改）
url: https://babyking.github.io/ai-daily-digest
baseurl: /ai-daily-digest

# Jekyll配置
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

# 分页（每页显示多少篇）
paginate: 10
paginate_path: /page:num/

# 排除的文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# 插件
plugins:
  - jekyll-paginate
